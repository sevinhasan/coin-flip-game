<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yazı Tura Oyunu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="container">
        <div class="stats">
            <p class="yazi-count">Yazı: 0</p>
            <p class="tura-count">Tura: 0</p>
        </div>
        <div class="coin">
            <div class="heads">
                <img src="img/heads.jpg" alt="">
            </div>
            <div class="tails">
                <img src="img/tails.webp" alt="">
            </div>
        </div>
        <div class="buttons">
            <button class="flip-btn">Döndür</button>
            <button class="reset-btn">Sıfırla</button>
        </div>
    </div>
    <script src="style.js"></script>
</body>
</html>
